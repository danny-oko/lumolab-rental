<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumo Lab — Түрээсийн систем</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c2330; --line:#2a3343;
    --ink:#e6edf3; --mut:#8b97a8; --acc:#7cff4f; --acc-d:#5ed433;
    --warn:#ffb84d; --out:#ff6b6b; --in:#3fb950;
    --acc-ink:#04210a; --chip-in-bg:#16331a; --chip-out-bg:#3a1b1b; --chip-zero-bg:#2a2f3a;
    --input-bg:#1c2330; --row-hover:#1a212d; --row-line:#1b2230; --th-fill:#23303f;
  }
  [data-theme="light"]{
    --bg:#f6f7f9; --panel:#ffffff; --panel2:#f0f2f5; --line:#d8dee6;
    --ink:#1a2230; --mut:#5d6b7e; --acc:#3fae22; --acc-d:#2f8c19;
    --warn:#c8851b; --out:#d83a3a; --in:#2f8c19;
    --acc-ink:#ffffff; --chip-in-bg:#dcf3df; --chip-out-bg:#fae0e0; --chip-zero-bg:#e7ebf0;
    --input-bg:#ffffff; --row-hover:#f3f5f8; --row-line:#eaedf1; --th-fill:#e7ebf0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;font-size:14px;
    transition:background .2s,color .2s}
  #root{max-width:1180px;margin:0 auto;padding:18px}
  h1{font-size:20px;margin:0;letter-spacing:.5px}
  .sub{color:var(--mut);font-size:12px;margin-top:2px}
  header{display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--acc);color:var(--acc-ink);
    display:grid;place-items:center;font-weight:800;font-size:18px}
  .theme-btn{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:17px;display:grid;place-items:center;
    transition:background .15s,border-color .15s}
  .theme-btn:hover{border-color:var(--acc)}
  .tabs{display:flex;gap:4px;margin-bottom:16px}
  .tab{padding:8px 16px;border-radius:8px 8px 0 0;background:var(--panel);color:var(--mut);
    border:1px solid var(--line);border-bottom:none;cursor:pointer;font-weight:600}
  .tab.on{background:var(--panel2);color:var(--acc)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  table.fixed{table-layout:fixed}
  th{text-align:left;color:var(--mut);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  td{padding:8px 10px;border-bottom:1px solid transparent}
  tr{border-bottom:1px solid var(--row-line)}
  tr:hover td{background:var(--row-hover)}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .price{font-variant-numeric:tabular-nums;font-weight:600}
  .chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .chip.in{background:var(--chip-in-bg);color:var(--in)}
  .chip.out{background:var(--chip-out-bg);color:var(--out)}
  .chip.zero{background:var(--chip-zero-bg);color:var(--mut)}
  input[type=checkbox]{width:17px;height:17px;accent-color:var(--acc);cursor:pointer}
  input[type=text],input[type=number],select,textarea,input[type=date]{
    background:var(--input-bg);border:1px solid var(--line);color:var(--ink);
    border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  label{display:block;color:var(--mut);font-size:12px;margin-bottom:4px;font-weight:600}
  .btn{background:var(--acc);color:var(--acc-ink);border:none;padding:9px 16px;border-radius:8px;
    font-weight:700;cursor:pointer;font-size:13px}
  .btn:hover{background:var(--acc-d)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--acc);color:var(--acc)}
  .btn.sm{padding:5px 11px;font-size:12px}
  .btn.warn{background:var(--warn);color:#fff}
  .btn.out{background:var(--out);color:#fff}
  .grid{display:grid;gap:12px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;flex:1;min-width:130px}
  .stat .v{font-size:22px;font-weight:800}
  .stat .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .cart{position:sticky;top:14px}
  .cartline{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--row-line);font-size:13px;gap:8px}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{flex:1;background:var(--panel2);border:none;color:var(--mut);padding:8px;cursor:pointer;font-weight:600;font-size:12px}
  .seg button.on{background:var(--acc);color:var(--acc-ink)}
  .muted{color:var(--mut)}
  .total{font-size:22px;font-weight:800;color:var(--acc)}
  .small{font-size:12px}
  .badge{font-size:10px;background:var(--th-fill);color:var(--mut);padding:1px 6px;border-radius:5px;margin-left:6px}
  .standnote{font-size:11px;color:var(--acc-d);margin-top:2px}
  .hr{height:1px;background:var(--line);margin:12px 0}
  .pill-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
  .danger{color:var(--out)}
  .ok{color:var(--in)}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
</style>
</head>

    doc.addFileToVFS("Noto-Regular.ttf",NOTO_REG);
    doc.addFont("Noto-Regular.ttf","Noto","normal");
    doc.addFileToVFS("Noto-Bold.ttf",NOTO_BOLD);
    doc.addFont("Noto-Bold.ttf","Noto","bold");
  }
}

function App(){
  const [tab,setTab] = useState("inv");
  const [inv,setInv] = useState(SEED);
  const [cart,setCart] = useState({}); // id -> qty
  const [days,setDays] = useState(0.5); // 0.5 = 12цаг, 1 = 24цаг, 2-14 = multi-day
  const [rentals,setRentals] = useState([]); // active rental records
  const [cust,setCust] = useState({name:"",reg:"",phone:"",addr:"",deposit:""});
  const [priceMode,setPriceMode] = useState("base"); // "base" = НӨАТ-гүй | "vat" = +10% НӨАТ нэмэх
  const [catFilter,setCatFilter] = useState("all");
  const [theme,setTheme] = useState("dark");
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
  },[theme]);

  const standItems = inv.filter(i=>i.isStand);
  const standTotalQty = standItems.reduce((s,i)=>s+i.qty,0);

  // available = stock - currently OUT
  const outMap = useMemo(()=>{
    const m={};
    rentals.filter(r=>r.status==="out").forEach(r=>{
      r.items.forEach(it=>{ m[it.id]=(m[it.id]||0)+it.qty; });
    });
    return m;
  },[rentals]);

  const avail = id => {
    const it = inv.find(i=>i.id===id);
    return it.qty - (outMap[id]||0);
  };

  // ГЭРЭЛ items that ENTITLE a free stand (exclude noStand: Ace25C, Halo, B7C)
  const freeEntitlement = useMemo(()=>{
    return Object.entries(cart).reduce((s,[id,q])=>{
      const it=inv.find(i=>i.id===+id);
      return s + (it && it.cat==="ГЭРЭЛ" && !it.noStand ? q : 0);
    },0);
  },[cart,inv]);

  const standsOut = standItems.reduce((s,i)=>s+(outMap[i.id]||0),0);
  const standsAvail = standTotalQty - standsOut;
  // pool eligible to be given FREE (Combo/noFree excluded)
  const freeStandAvail = standItems.filter(i=>!i.noFree)
    .reduce((s,i)=>s + Math.max(0,i.qty-(outMap[i.id]||0)),0);

  // 12цаг (days=0.5) = ×1.0 base; else ×1.3 per day. 4+ days = 10% off whole rental.
  const durMult = days===0.5 ? 1.0 : 1.30 * days;
  const longDiscount = days>=4 ? 0.10 : 0;
  const durLabel = days===0.5 ? "12 цаг" : days===1 ? "24 цаг" : `${days} өдөр${days>=4?" (-10%)":""}`;

  // Build line items. Stands are normal cart items; free entitlement discounts up to
  // `freeEntitlement` eligible (non-noFree) stand-units to ₮0, cheapest first. If the cart
  // has fewer eligible stands than the entitlement, auto-add the shortfall as free lines.
  const lines = useMemo(()=>{
    const L=[];
    let freeLeft = freeEntitlement;
    // remaining free-eligible stock per stand (for auto-adding shortfall)
    const remainFree={};
    standItems.filter(s=>!s.noFree).forEach(si=>{ remainFree[si.id]=Math.max(0,si.qty-(outMap[si.id]||0)); });

    // 1) walk cart items (sorted), splitting stands into free/paid portions
    const cartIds = Object.keys(cart).map(Number).filter(id=>(cart[id]||0)>0);
    const cartItems = inv.filter(i=>cartIds.includes(i.id)).sort(bySort);
    // among stands in cart, eligible (non-noFree) ones get the free discount cheapest-first
    const eligStandIdsInCart = cartItems.filter(i=>i.isStand && !i.noFree).sort((a,b)=>a.price-b.price).map(i=>i.id);
    const freeFromCart={};
    for(const id of eligStandIdsInCart){
      if(freeLeft<=0) break;
      const q=cart[id];
      const take=Math.min(q,freeLeft);
      freeFromCart[id]=take; freeLeft-=take;
      remainFree[id]-= take; // these cart units consume the free pool
    }
    cartItems.forEach(it=>{
      const q=cart[it.id];
      if(it.isStand && freeFromCart[it.id]){
        const f=freeFromCart[it.id], pd=q-f;
        if(pd>0) L.push({id:it.id,name:it.name,qty:pd,unit:it.price,cat:it.cat,isStand:true});
        L.push({id:it.id+"_free",name:it.name,qty:f,unit:0,cat:it.cat,isStand:true,freeStand:true});
      } else {
        L.push({id:it.id,name:it.name,qty:q,unit:it.price,cat:it.cat,isStand:it.isStand});
      }
    });

    // 2) auto-add shortfall: lights entitle more free stands than are in the cart
    if(freeLeft>0){
      [...standItems].filter(s=>!s.noFree).sort((a,b)=>a.price-b.price).forEach(si=>{
        if(freeLeft<=0) return;
        const take=Math.min(remainFree[si.id]||0, freeLeft);
        if(take>0){ L.push({id:si.id+"_auto",name:si.name,qty:take,unit:0,cat:si.cat,isStand:true,freeStand:true,auto:true}); freeLeft-=take; remainFree[si.id]-=take; }
      });
    }
    return L;
  },[cart,inv,freeEntitlement,standItems,outMap]);

  const freeShort = (()=>{ // how many entitled free stands could NOT be fulfilled
    const got = lines.filter(l=>l.freeStand).reduce((s,l)=>s+l.qty,0);
    return Math.max(0, freeEntitlement - got);
  })();

  // listed prices are НӨАТ-ГҮЙ (base). Apply duration mult, then 4+ day discount. Optionally add 10% НӨАТ.
  const grossDur = lines.reduce((s,l)=>s + l.unit*l.qty*durMult,0);
  const discountAmt = grossDur * longDiscount;
  const base = grossDur - discountAmt;   // НӨАТ-гүй дүн after long-rental discount
  const addVat = priceMode==="vat";
  const vatAmt = addVat ? base*VAT : 0;
  const charged = base + vatAmt;                    // total payable

  const setQty = (id,v)=>{
    const max=avail(id);
    const q=Math.max(0,Math.min(max, v));
    setCart(c=>({...c,[id]:q}));
  };

  const toggle = id => {
    setCart(c=> c[id] ? {...c,[id]:0} : {...c,[id]:1});
  };

  const cartCount = Object.values(cart).filter(q=>q>0).length;

  function checkout(){
   try{
    if(lines.length===0){ alert("Эхлээд бараа сонгоно уу."); return; }
    if(!cust.name || !cust.name.trim()){ alert("Түрээслэгчийн нэрийг бөглөнө үү."); return; }
    if(freeShort>0){
      const ok=confirm(`Анхаар: ${freeShort} үнэгүй стенд бэлэн байхгүй тул дагалдуулж чадсангүй (Combo stand үнэгүй биш). Үргэлжлүүлэх үү?`);
      if(!ok) return;
    }
    const rec={
      id:"R"+Date.now().toString().slice(-6),
      date:new Date().toISOString().slice(0,10),
      cust:{...cust},
      days, durLabel,
      priceMode,
      modeLabel: priceMode==="vat"?"НӨАТ-тай (+10%)":"НӨАТ-гүй",
      items:lines.map(l=>({id:l.id,name:l.name,qty:l.qty,unit:l.unit,isStand:l.isStand,freeStand:l.freeStand})),
      gross:grossDur, discount:discountAmt, base, vat:vatAmt, total:charged,
      status:"out"
    };
    setRentals(r=>[rec,...r]);
    setCart({}); setDays(0.5);
    setCust({name:"",reg:"",phone:"",addr:"",deposit:""});
    setTab("active");
   }catch(err){ alert("Алдаа гарлаа: "+err.message); console.error(err); }
  }

  function ret(rid){
    setRentals(rs=>rs.map(r=>r.id===rid?{...r,status:"in",returnDate:new Date().toISOString().slice(0,10)}:r));
  }

  // ---- PDF (Cyrillic Mongolian) ----
  function genPDF(rec){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"mm",format:"a4"});
    ensureFonts(doc);
    const W=210, M=16, R=W-M; let y=18;
    const F=(s,sz)=>{doc.setFont("Noto",s);doc.setFontSize(sz);};

    // Header
    F("bold",15); doc.text("Lumo Lab LLC", M, y);
    F("normal",10.5); doc.text("Тоног төхөөрөмжийн түрээсийн гэрээ", R, y, {align:"right"});
    y+=3; doc.setDrawColor(60); doc.setLineWidth(0.3); doc.line(M,y,R,y); y+=7;

    F("normal",9.5);
    doc.text(`Гэрээний дугаар: ${rec.id}`, M, y);
    doc.text(`Огноо: ${rec.date}`, R, y, {align:"right"}); y+=8;

    // Renter
    F("bold",10); doc.text("Түрээслэгчийн мэдээлэл", M, y); y+=5.5;
    F("normal",9.5);
    const c=rec.cust;
    doc.text(`Нэр: ${c.name||"-"}`, M, y);
    doc.text(`Утас: ${c.phone||"-"}`, 110, y); y+=5;
    doc.text(`Регистрийн дугаар: ${c.reg||"-"}`, M, y);
    doc.text(`Хаяг: ${c.addr||"-"}`, 110, y); y+=8;

    // Equipment table
    F("bold",10); doc.text("Түрээслүүлсэн тоног төхөөрөмж", M, y); y+=5;
    const cQty=120, cUnit=160, cSum=R-1;
    doc.setFillColor(238,238,238); doc.rect(M,y-4,R-M,6.5,"F");
    F("bold",8.5);
    doc.text("Тоног төхөөрөмж", M+2, y);
    doc.text("Тоо", cQty, y, {align:"right"});
    doc.text("Нэгж үнэ", cUnit, y, {align:"right"});
    doc.text("Нийт", cSum, y, {align:"right"});
    y+=5.5;
    F("normal",9);
    rec.items.forEach(it=>{
      // equipment names stay English
      doc.text(it.name + (it.isStand?" *":""), M+2, y);
      doc.text(String(it.qty), cQty, y, {align:"right"});
      doc.text(it.unit===0?"Үнэгүй":it.unit.toLocaleString("en-US"), cUnit, y, {align:"right"});
      doc.text(it.unit===0?"Үнэгүй":(it.unit*it.qty).toLocaleString("en-US"), cSum, y, {align:"right"});
      y+=5;
      if(y>250){doc.addPage();y=20;}
    });
    y+=1; doc.setLineWidth(0.2); doc.line(M,y,R,y); y+=6;

    // Duration + VAT mode (clean Cyrillic, no garbled spacing)
    F("normal",9.5);
    doc.text(`Түрээсийн хугацаа: ${rec.durLabel}`, M, y); y+=5;
    doc.text(`Үнийн нөхцөл: ${rec.modeLabel}`, M, y); y+=6;

    // Totals (right aligned block)
    const lblX=125;
    if(rec.discount>0){
      doc.text("Дэд дүн:", lblX, y); doc.text(fmtP(rec.gross), cSum, y, {align:"right"}); y+=5;
      doc.text("Урт хугацааны хямдрал (-10%):", lblX-35, y); doc.text("-"+fmtP(rec.discount), cSum, y, {align:"right"}); y+=5;
    }
    doc.text("НӨАТ-гүй дүн:", lblX, y); doc.text(fmtP(rec.base), cSum, y, {align:"right"}); y+=5;
    if(rec.vat>0){ doc.text("НӨАТ (10%):", lblX, y); doc.text(fmtP(rec.vat), cSum, y, {align:"right"}); y+=5; }
    if(c.deposit){ doc.text("Барьцаа:", lblX, y); doc.text(fmtP(+c.deposit), cSum, y, {align:"right"}); y+=5; }
    F("bold",10.5);
    doc.text("Нийт төлбөр:", lblX, y); doc.text(fmtP(rec.total), cSum, y, {align:"right"}); y+=8;

    // Заавар / нөхцөл
    F("bold",9.5); doc.setTextColor(0);
    doc.text("Гэрээний нөхцөл ба заавар", M, y); y+=5;
    F("normal",8); doc.setTextColor(40);
    const terms=[
      "1. Жагсаалтад заасан үнэ нь 12 цагийн түрээсийн НӨАТ-гүй суурь үнэ юм. 24 цаг (1 өдөр) болон түүнээс дээш өдрийн түрээс өдөр тутамд суурь үнийн 1.3 дахин тооцогдоно. 4 болон түүнээс дээш өдрийн түрээсэд нийт дүнгээс 10% хямдрал үзүүлнэ.",
      "2. * тэмдэгтэй гэрлийн стенд / C-stand нь гэрэл түрээслэхэд үнэгүй дагалдана (Combo stand хамаарахгүй).",
      "3. Түрээслэгч тоног төхөөрөмжийг хүлээн авах үед бүрэн бүтэн байдлыг шалгаж хүлээн авна. Буцаах үед анхны бүрэн бүтэн байдлаар нь хүлээлгэн өгнө.",
      "4. Эвдрэл, гэмтэл гарсан тохиолдолд засварын болон сэлбэгийн нийт зардлыг Түрээслэгч хариуцан төлнө.",
      "5. Тоног төхөөрөмж бүрэн ажиллагаагүй болсон, эсхүл алдагдсан тохиолдолд тухайн төхөөрөмжийн зах зээлийн бүрэн өртөгийг Түрээслэгч нөхөн төлнө.",
      "6. Тохиролцсон хугацаанаас хэтэрсэн тохиолдолд хоног тутамд нэмэлт түрээсийн төлбөр тооцогдоно.",
      "7. Түрээслэгч дээрх нөхцөлтэй бүрэн танилцаж, зөвшөөрсөн бөгөөд гарын үсэг зурснаар баталгаажуулав."
    ];
    terms.forEach(t=>{ const w=doc.splitTextToSize(t,R-M); doc.text(w,M,y); y+=w.length*3.7+1.8; });

    // Signatures
    y=Math.max(y+6,266); doc.setTextColor(0); F("normal",9.5);
    doc.setLineWidth(0.3);
    doc.line(M,y,M+62,y); doc.line(R-62,y,R,y); y+=5;
    doc.text("Түрээслэгч (гарын үсэг)", M, y);
    doc.text("Lumo Lab (гарын үсэг)", R-62, y);

    doc.save(`Lumo_Lab_Geree_${rec.id}.pdf`);
  }
  const fmtP = n => "₮" + Math.round(n).toLocaleString("en-US");

  // adjust stock editing
  function editStock(id,field,val){
    const strFields=['name','cat'];
    setInv(iv=>iv.map(i=>i.id===id?{...i,[field]: strFields.includes(field)?val:(+val||0)}:i));
  }

  const totalSku = inv.length;
  const outCount = Object.keys(outMap).length;
  const activeR = rentals.filter(r=>r.status==="out").length;

  return (
    <div>
      <header>
        <div className="logo" style={{color:"var(--acc-ink)"}}><LumoMark size={24}/></div>
        <div>
          <h1>Lumo Lab — Түрээсийн систем</h1>
          <div className="sub">Бараа материал · үнэ тооцоолол · түрээсийн гэрээ</div>
        </div>
        <button className="theme-btn" title={theme==="dark"?"Гэрэлтэй горим":"Харанхуй горим"}
          onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}>{theme==="dark"?"☀":"☾"}</button>
      </header>

      <div className="row" style={{marginBottom:16}}>
        <div className="stat"><div className="v">{totalSku}</div><div className="l">Нэр төрөл</div></div>
        <div className="stat"><div className="v ok">{inv.reduce((s,i)=>s+avail(i.id),0)}</div><div className="l">Агуулахад бэлэн</div></div>
        <div className="stat"><div className="v danger">{Object.values(outMap).reduce((s,n)=>s+n,0)}</div><div className="l">Гарсан нэгж</div></div>
        <div className="stat"><div className="v warn">{activeR}</div><div className="l">Идэвхтэй түрээс</div></div>
        <div className="stat"><div className="v">{standsAvail}</div><div className="l">Бэлэн стенд</div></div>
      </div>

      <div className="tabs">
        <div className={"tab"+(tab==="inv"?" on":"")} onClick={()=>setTab("inv")}>📦 Бараа материал</div>
        <div className={"tab"+(tab==="rent"?" on":"")} onClick={()=>setTab("rent")}>🧾 Шинэ түрээс {cartCount>0&&<span className="badge">{cartCount}</span>}</div>
        <div className={"tab"+(tab==="active"?" on":"")} onClick={()=>setTab("active")}>🚚 Идэвхтэй / Түүх</div>
      </div>

      {tab==="inv" && (
        <div className="panel">
          <div className="row" style={{justifyContent:"space-between",marginBottom:10}}>
            <strong>Бүх бараа (Авах техникийн жагсаалт)</strong>
            <span className="muted small">Үнэ = 12 цагийн <b>НӨАТ-гүй</b> суурь дүн. Тоо ширхэг, үнэ, төрөл засаж болно.</span>
          </div>
          <div className="pill-row">
            <button className={"btn sm "+(catFilter==="all"?"":"ghost")} onClick={()=>setCatFilter("all")}>Бүгд ({inv.length})</button>
            {CATS.map(c=>{
              const n=inv.filter(i=>i.cat===c).length;
              return <button key={c} className={"btn sm "+(catFilter===c?"":"ghost")} onClick={()=>setCatFilter(c)}>{c} ({n})</button>;
            })}
          </div>
          <table className="fixed">
            <colgroup>
              <col style={{width:"auto"}}/><col style={{width:"140px"}}/><col style={{width:"80px"}}/>
              <col style={{width:"70px"}}/><col style={{width:"120px"}}/><col style={{width:"96px"}}/>
            </colgroup>
            <thead><tr>
              <th>Нэр</th><th>Бэлэн төрөл</th><th className="num">Нийт</th>
              <th className="num">Бэлэн</th><th className="num">Үнэ (12ц, НӨАТ-гүй)</th><th>Төлөв</th>
            </tr></thead>
            <tbody>
            {inv.filter(i=>catFilter==="all"||i.cat===catFilter).sort(bySort).map(i=>{
              const a=avail(i.id);
              return (
              <tr key={i.id}>
                <td><span style={{display:"inline-flex",alignItems:"center",gap:8}}><span style={{color:"var(--acc)"}}><CatIcon cat={i.cat} size={26}/></span>{i.name}{i.isStand&&i.noFree&&<span className="badge">үнэгүй биш</span>}{i.isStand&&!i.noFree&&<span className="badge">гэрэлд үнэгүй</span>}</span></td>
                <td>
                  <select value={i.cat} onChange={e=>editStock(i.id,'cat',e.target.value)} style={{width:120}}>
                    {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </td>
                <td className="num"><input type="number" className="num" style={{width:60}} value={i.qty} onChange={e=>editStock(i.id,'qty',e.target.value)}/></td>
                <td className="num"><span className={a>0?"ok":"danger"}>{a}</span></td>
                <td className="num"><input type="number" className="num" style={{width:90}} value={i.price} onChange={e=>editStock(i.id,'price',e.target.value)}/></td>
                <td>{a<=0?<span className="chip out">Дууссан</span>:i.qty===a?<span className="chip in">Бэлэн</span>:<span className="chip zero">{a}/{i.qty}</span>}</td>
              </tr>);
            })}
            </tbody>
          </table>
          <div className="hr"></div>
          <div className="small muted">Ray гэрэл (660C/360C/120C) түрээслэхэд стенд автоматаар ₮0-р дагалдана. Ace25C, Halo 60x, B7C Bulb-д стенд дагалдахгүй. Combo stand нь тусдаа бүтээгдэхүүн бөгөөд үнэгүй дагалдахгүй. Бүх стенд жагсаалтад үнэтэй харагдана.</div>
        </div>
      )}

      {tab==="rent" && (
        <div className="grid" style={{gridTemplateColumns:"1fr 340px"}}>
          <div className="panel">
            <div className="row" style={{justifyContent:"space-between"}}>
              <strong>Тоног төхөөрөмж сонгох</strong>
              <span className="muted small">Тоо оруулж захиалгад нэмнэ (ж: 2× = 2 дахин)</span>
            </div>
            <div className="pill-row">
              <button className={"btn sm "+(catFilter==="all"?"":"ghost")} onClick={()=>setCatFilter("all")}>Бүгд</button>
              {CATS.map(c=> <button key={c} className={"btn sm "+(catFilter===c?"":"ghost")} onClick={()=>setCatFilter(c)}>{c}</button>)}
            </div>
            <table className="fixed" style={{marginTop:6}}>
              <colgroup>
                <col style={{width:"auto"}}/><col style={{width:"82px"}}/><col style={{width:"64px"}}/>
                <col style={{width:"96px"}}/><col style={{width:"128px"}}/><col style={{width:"104px"}}/>
              </colgroup>
              <thead><tr><th>Нэр</th><th>Төрөл</th><th className="num">Бэлэн</th><th className="num">Нэгж үнэ</th><th className="num">Тоо</th><th className="num">Дүн</th></tr></thead>
              <tbody>
              {inv.filter(i=>catFilter==="all"||i.cat===catFilter).sort(bySort).map(i=>{
                const a=avail(i.id); const q=cart[i.id]||0;
                return (
                <tr key={i.id}>
                  <td><span style={{display:"inline-flex",alignItems:"center",gap:8}}><span style={{color:"var(--acc)"}}><CatIcon cat={i.cat} size={26}/></span>{i.name}{i.cat==="ГЭРЭЛ"&&!i.noStand&&<span className="badge">+стенд</span>}{i.isStand&&i.noFree&&<span className="badge">үнэгүй биш</span>}</span></td>
                  <td className="small muted">{i.cat}</td>
                  <td className="num"><span className={a>0?"ok":"danger"}>{a}</span></td>
                  <td className="num price">{fmt(i.price)}</td>
                  <td className="num">
                    <div className="row" style={{gap:3,justifyContent:"flex-end",flexWrap:"nowrap"}}>
                      <button className="btn sm ghost" style={{padding:"3px 8px"}} disabled={q<=0} onClick={()=>setQty(i.id,q-1)}>−</button>
                      <input type="number" className="num" style={{width:46}} min="0" max={a} value={q}
                        disabled={a<=0} onChange={e=>setQty(i.id,+e.target.value)}/>
                      <button className="btn sm ghost" style={{padding:"3px 8px"}} disabled={q>=a} onClick={()=>setQty(i.id,q+1)}>+</button>
                    </div>
                  </td>
                  <td className="num price">{q>0?fmt(i.price*q*durMult):"—"}</td>
                </tr>);
              })}
              </tbody>
            </table>
          </div>

          <div className="cart panel">
            <strong>Захиалга</strong>
            <div style={{margin:"10px 0"}}>
              <label>Хугацаа — {durLabel}</label>
              <div className="seg" style={{marginBottom:8}}>
                <button className={days===0.5?"on":""} onClick={()=>setDays(0.5)}>12 цаг</button>
                <button className={days===1?"on":""} onClick={()=>setDays(1)}>24 цаг<br/><span style={{fontSize:9}}>1 өдөр</span></button>
                <button className={days>=2?"on":""} onClick={()=>setDays(d=>d>=2?d:2)}>Олон<br/><span style={{fontSize:9}}>өдөр</span></button>
              </div>
              {days>=2 && (
                <div>
                  <input type="range" min="2" max="14" step="1" value={days}
                    onChange={e=>setDays(+e.target.value)} style={{width:"100%",accentColor:"var(--acc)"}}/>
                  <div className="row" style={{justifyContent:"space-between"}}>
                    <span className="small muted">2 өдөр</span>
                    <span className="small" style={{fontWeight:700}}>{days} өдөр {days>=4&&<span className="ok">−10%</span>}</span>
                    <span className="small muted">14 өдөр</span>
                  </div>
                  <div className="small muted">4+ өдөр түрээслэхэд нийт дүнгээс 10% хямдарна.</div>
                </div>
              )}
            </div>

            <div style={{margin:"10px 0"}}>
              <label>НӨАТ</label>
              <div className="seg">
                <button className={priceMode==="base"?"on":""} onClick={()=>setPriceMode("base")}>НӨАТ-гүй<br/><span style={{fontSize:9}}>суурь үнэ</span></button>
                <button className={priceMode==="vat"?"on":""} onClick={()=>setPriceMode("vat")}>НӨАТ нэмэх<br/><span style={{fontSize:9}}>+10%</span></button>
              </div>
            </div>

            {freeEntitlement>0 && (
              <div style={{margin:"10px 0"}}>
                <div className="standnote">
                  {freeShort>0
                    ? `⚠ ${freeShort} үнэгүй стенд бэлэн алга (Combo үнэгүй биш).`
                    : `✓ ${freeEntitlement} стенд гэрэлтэй ₮0-р дагалдана.`}
                </div>
              </div>
            )}

            <div className="hr"></div>
            {lines.length===0 && <div className="muted small">Бараа сонгоогүй байна.</div>}
            {lines.map(l=>(
              <div className="cartline" key={l.id}>
                <span>{l.name} {l.freeStand&&<span className="badge">гэрэлтэй ₮0</span>} ×{l.qty}</span>
                <span className="price">{l.unit===0?<span className="ok">Үнэгүй</span>:fmt(l.unit*l.qty*durMult)}</span>
              </div>
            ))}
            <div className="hr"></div>

            <div className="cartline"><span className="muted">Дэд дүн ({durLabel})</span><span className="price">{fmt(grossDur)}</span></div>
            {longDiscount>0 && <div className="cartline"><span className="muted">Урт хугацааны хямдрал (−10%)</span><span className="price ok">−{fmt(discountAmt)}</span></div>}
            <div className="cartline"><span className="muted">НӨАТ-гүй дүн</span><span className="price">{fmt(base)}</span></div>
            {addVat && <div className="cartline"><span className="muted">НӨАТ (10%)</span><span className="price">+{fmt(vatAmt)}</span></div>}
            <div className="cartline" style={{borderBottom:"none"}}><span>Нийт төлөх</span><span className="total">{fmt(charged)}</span></div>

            <div className="hr"></div>
            <label>Түрээслэгчийн мэдээлэл <span className="danger">*Нэр заавал</span></label>
            <div className="grid" style={{gap:6}}>
              <input type="text" placeholder="Нэр (заавал)" value={cust.name} onChange={e=>setCust({...cust,name:e.target.value})}/>
              <input type="text" placeholder="Утас" value={cust.phone} onChange={e=>setCust({...cust,phone:e.target.value})}/>
              <input type="text" placeholder="Регистр / РД" value={cust.reg} onChange={e=>setCust({...cust,reg:e.target.value})}/>
              <input type="text" placeholder="Хаяг" value={cust.addr} onChange={e=>setCust({...cust,addr:e.target.value})}/>
              <input type="number" placeholder="Барьцаа (deposit)" value={cust.deposit} onChange={e=>setCust({...cust,deposit:e.target.value})}/>
            </div>
            <button className="btn" style={{width:"100%",marginTop:12}}
              onClick={checkout}>Төлбөр баталгаажуулж гэрээ үүсгэх</button>
            {(lines.length===0 || !cust.name) &&
              <div className="small danger" style={{marginTop:6}}>
                {lines.length===0 ? "⚠ Эхлээд бараа сонгоно уу."
                  : "⚠ Түрээслэгчийн нэрийг бөглөнө үү."}
              </div>}
            <div className="small muted" style={{marginTop:6}}>Гэрээ үүсгэснээр Түүх рүү нэмэгдэж, PDF татах боломжтой болно.</div>
          </div>
        </div>
      )}

      {tab==="active" && (
        <div className="panel">
          <strong>Түрээсийн бүртгэл</strong>
          {rentals.length===0 && <div className="muted small" style={{marginTop:10}}>Одоогоор түрээс байхгүй. "Шинэ түрээс" табаас үүсгэнэ үү.</div>}
          <table style={{marginTop:10}}>
            <thead><tr>
              <th>#</th><th>Огноо</th><th>Түрээслэгч</th><th>Бараа</th><th>Хугацаа</th>
              <th className="num">Төлсөн дүн</th><th>Төлөв</th><th></th>
            </tr></thead>
            <tbody>
            {rentals.map(r=>(
              <tr key={r.id}>
                <td>{r.id}</td>
                <td className="small">{r.date}{r.returnDate&&<div className="muted">↩ {r.returnDate}</div>}</td>
                <td>{r.cust.name}<div className="muted small">{r.cust.phone}</div></td>
                <td className="small">{r.items.map(i=>`${i.name}×${i.qty}`).join(", ")}</td>
                <td className="small">{r.durLabel}<div className="muted">{r.modeLabel}</div></td>
                <td className="num price">{fmt(r.total)}</td>
                <td>{r.status==="out"?<span className="chip out">Гарсан</span>:<span className="chip in">Ирсэн</span>}</td>
                <td>
                  <div className="row" style={{gap:6}}>
                    <button className="btn sm ghost" onClick={()=>genPDF(r)}>PDF</button>
                    {r.status==="out" && <button className="btn sm warn" onClick={()=>ret(r.id)}>Ирсэн</button>}
                  </div>
                </td>
              </tr>
            ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
